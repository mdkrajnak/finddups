<div class="p-4">
    <div class="flex justify-between items-center mb-4">
        <div>
            <h3 class="text-xl font-bold text-gray-900">Review Duplicate Group</h3>
            <p class="text-sm text-gray-600 mt-1">Select the file you want to <strong class="text-green-600">keep</strong> — others will be marked for deletion</p>
        </div>
        <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-2xl leading-none">&times;</button>
    </div>

    <p class="text-sm text-gray-600 mb-6">
        {{len .Files}} files × {{formatBytes .Size}} = {{formatBytes (mul .Size (len .Files))}}
        <span class="text-red-600 font-semibold ml-2">({{formatBytes .WastedBytes}} wasted)</span>
    </p>

    <form id="mark-group-form"
          data-group-id="{{.GroupID}}"
          class="space-y-2">
        {{range .Files}}
        {{$isKeeper := eq .ID $.KeeperFileID}}
        <label class="group flex items-start p-3 border-2 {{if $isKeeper}}border-green-500 bg-green-50{{else}}border-gray-300{{end}} rounded hover:bg-green-50 hover:border-green-300 cursor-pointer transition-all">
            <input type="radio" name="keep_file_id" value="{{.ID}}" required
                   {{if $isKeeper}}checked{{end}}
                   class="mt-1 mr-3 h-4 w-4 text-green-600 focus:ring-green-500">
            {{if isImage .Path}}
            <div class="mr-3 flex-shrink-0">
                <img src="/api/files/{{.ID}}/preview"
                     alt="Preview of {{basename .Path}}"
                     class="preview-thumbnail w-24 h-24 object-cover rounded border border-gray-300 cursor-pointer hover:opacity-80 transition-opacity"
                     onclick="event.preventDefault(); event.stopPropagation(); openImageModal({{.ID}}, '{{basename .Path}}');"
                     onerror="this.onerror=null; this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22%3E%3Crect fill=%22%23ddd%22 width=%22100%22 height=%22100%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 fill=%22%23999%22 text-anchor=%22middle%22 dy=%22.3em%22 font-size=%2212%22%3EError%3C/text%3E%3C/svg%3E';">
            </div>
            {{end}}
            <div class="flex-1 min-w-0">
                <div class="flex items-center justify-between mb-1">
                    <p class="text-sm font-medium text-gray-900 truncate">{{basename .Path}}</p>
                    <span class="text-xs font-semibold text-green-600 px-2 py-1 bg-green-100 rounded {{if $isKeeper}}opacity-100{{else}}opacity-0 group-hover:opacity-60{{end}} transition-opacity radio-label">
                        ✓ KEEP
                    </span>
                </div>
                <p class="text-xs text-gray-500 truncate" title="{{.Path}}">{{dirname .Path}}</p>
                <p class="text-xs text-gray-400 mt-1">Modified: {{formatTime .MtimeSec}}</p>
            </div>
        </label>
        {{end}}

        <div class="flex justify-end space-x-2 mt-6 pt-4 border-t">
            <button type="button" onclick="closeModal()"
                    class="px-4 py-2 bg-gray-200 text-gray-800 rounded hover:bg-gray-300 transition-colors">
                Cancel
            </button>
            <button type="submit"
                    class="px-4 py-2 bg-red-600 text-white rounded hover:bg-red-700 transition-colors flex items-center gap-2">
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                </svg>
                Keep Selected, Delete Others
            </button>
        </div>
    </form>
</div>

{{if .Deletions}}
<div class="mb-4 p-4 bg-yellow-50 border border-yellow-200 rounded">
    <p class="text-yellow-800">
        <strong class="font-semibold">{{.TotalCount}}</strong> files marked for deletion
        (<strong class="font-semibold">{{formatBytes .TotalBytes}}</strong> total)
    </p>
</div>

<div class="space-y-2">
    {{range .Deletions}}
    <div id="deletion-{{.ID}}" class="flex justify-between items-center p-3 bg-white border rounded hover:bg-gray-50 transition-colors">
        <div class="flex-1 min-w-0 mr-4">
            <p class="text-sm font-medium text-gray-900 truncate" title="{{.Path}}">{{basename .Path}}</p>
            <p class="text-xs text-gray-500 truncate">{{dirname .Path}}</p>
            <p class="text-xs text-gray-400 mt-1">Marked: {{formatTime .MarkedAt}}</p>
        </div>
        <button hx-delete="/api/deletions/{{.FileID}}"
                hx-target="#deletion-{{.ID}}"
                hx-swap="outerHTML swap:0.5s"
                hx-confirm="Unmark this file for deletion?"
                class="px-3 py-1 bg-gray-200 text-gray-700 rounded hover:bg-gray-300 text-sm transition-colors flex-shrink-0">
            Unmark
        </button>
    </div>
    {{end}}
</div>
{{else}}
<div class="text-center py-12 bg-white rounded-lg shadow">
    <svg class="mx-auto h-12 w-12 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
    </svg>
    <p class="text-gray-500 text-lg font-medium mt-4">No files marked for deletion</p>
    <p class="text-gray-400 text-sm mt-2">Review duplicate groups to mark files</p>
</div>
{{end}}
